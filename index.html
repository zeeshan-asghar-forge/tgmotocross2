<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TG Motocross 2 - HTML5 Port</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #0a0f1e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial Narrow', Arial, 'Elementary SF Black', 'Chanson Heavy SF', Tahoma, monospace;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
            border: 4px solid #444;
            background: #000;
        }

        canvas {
            display: block;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
            cursor: pointer;
        }

        #ui-overlay {
            display: none;
        }

        .hud-text {
            position: absolute;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 12px;
            border-radius: 8px;
            font-weight: bold;
            color: #fff;
            font-size: 14px;
            pointer-events: none;
            font-family: 'Arial Narrow', Arial, 'Elementary SF Black', 'Chanson Heavy SF', Tahoma, monospace;
        }

        #timer {
            top: 10px;
            left: 10px;
        }

        #lap {
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
        }

        #speedometer {
            bottom: 10px;
            top: auto;
            left: auto;
            right: 10px;
            font-size: 20px;
        }

        #debug {
            position: absolute;
            bottom: 5px;
            left: 10px;
            font-size: 10px;
            color: #0f0;
            background: rgba(0, 0, 0, 0.5);
            pointer-events: none;
            font-family: monospace;
        }
    </style>
</head>

<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="500"></canvas>
        <div id="timer" class="hud-text">TIME 00:00.00</div>
        <div id="lap" class="hud-text">LAP 1 / 3</div>
        <div id="speedometer" class="hud-text"><span id="speed-val">0</span> km/h</div>
        <div id="debug"></div>
    </div>

    <script src="maps.js"></script>
    <script>
        (function () {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const debugDiv = document.getElementById('debug');

            // ---------- Constants ----------
            const GRAVITY = 1000;
            const WHEEL_RADIUS = 12;
            const ACCEL = 130;
            const BRAKE_FORCE = 500;
            const LEAN_SPEED = 4.0;
            const MAX_LEAN = 0.65;
            const TOTAL_LAPS = 3;

            // ---------- World ----------
            let currentLevel = 0;
            let levelWidth = 0, levelHeight = 0;
            let mapData = null;

            // ---------- Sine-wave terrain ----------
            let terrainSamples = [];
            const TERRAIN_SAMPLE_STEP = 4;

            function generateSineTerrain() {
                if (levelWidth <= 0) return;
                const numSamples = Math.floor(levelWidth / TERRAIN_SAMPLE_STEP) + 1;
                terrainSamples = new Array(numSamples);
                const baseY = levelHeight * 0.58;
                for (let i = 0; i < numSamples; i++) {
                    const x = i * TERRAIN_SAMPLE_STEP;
                    let y = baseY;
                    y += Math.sin(x * 0.0028) * 52;
                    y += Math.sin(x * 0.0065 + 1.3) * 36;
                    y += Math.sin(x * 0.014 + 0.7) * 22;
                    y += Math.sin(x * 0.029 + 2.1) * 13;
                    y += Math.sin(x * 0.0009 + 0.4) * 28;
                    y += Math.sin(x * 0.052 + 3.7) * 8;
                    terrainSamples[i] = y;
                }
            }

            function getTerrainHeightAt(x) {
                if (terrainSamples.length === 0) return levelHeight * 0.58;
                const wrappedX = ((x % levelWidth) + levelWidth) % levelWidth;
                const idx = wrappedX / TERRAIN_SAMPLE_STEP;
                const i0 = Math.floor(idx);
                const i1 = (i0 + 1) % terrainSamples.length;
                const t = idx - i0;
                const y0 = terrainSamples[i0];
                const y1 = terrainSamples[i1];
                return y0 + (y1 - y0) * t;
            }



            // ---------- Game State ----------
            let gameState = 'menu';
            let subMenu = null;
            let startProtection = 1.0;
            let finalRaceTime = 0;

            // ---------- Race Timer ----------
            let raceTime = 0;
            let raceTimeRunning = false;

            // ---------- Lap & Stage ----------
            let currentLap = 1;
            let currentStage = 1;
            let lapCrossed = false;
            let finishLinesCrossed = 0;
            let finishLineX = 0;

            // ---------- Bike ----------
            let points = [], prevPoints = [], constraints = [];
            let bikeVelocity = 0, bikeLeanAngle = 0, targetLean = 0;
            let cameraX = 0, cameraY = 0;
            let wheelAngle = 50;

            // ---------- Particles ----------
            let particles = [];
            const dirtImages = [];
            for (let i = 1; i <= 8; i++) {
                const img = new Image();
                img.src = `assets/sprites/dirt/${i}.png`;
                dirtImages.push(img);
            }



            // ---------- Sound Toggle ----------
            let soundEnabled = true;
            const SOUND_BTN_W = 44;
            const SOUND_BTN_H = 26;
            const SOUND_BTN_X = canvas.width - SOUND_BTN_W - 10;
            const SOUND_BTN_Y = canvas.height - 28 - 28 - SOUND_BTN_H;

            // ---------- Background Music ----------
            const bgMusic = new Audio('music/mondamusic-retro-arcade-game-music-512837.mp3');
            bgMusic.loop = true;
            bgMusic.volume = 1.0;

            // ---------- Lap completion tracking ----------
            let lapCompleted = [false, false, false];   // index 0 = lap1, 1 = lap2, 2 = lap3

            function syncMusic() {
                const shouldPlay = (gameState === 'playing' || gameState === 'paused') && soundEnabled;
                if (shouldPlay) {
                    bgMusic.play().catch(() => { });
                } else {
                    bgMusic.pause();
                }
            }

            // ---------- Assets ----------
            const assets = {};
            const assetPaths = {
                tiles: 'assets/tiles.png',
                wheel: 'assets/sprites/wheel/wheel_tire.png',
                body: 'assets/sprites/bikeBody/1.png',
                backShaft: 'assets/sprites/bikeBackShaft/1.png',
                frontShockBase: 'assets/sprites/bikeFrontShockBase/1.png',
                frontShockShaft: 'assets/sprites/bikeFrontShockShaft/1.png',
                frontShockTip: 'assets/sprites/bikeFrontShockTip/1.png',
                manTorso: 'assets/sprites/manTorso/1.png',
                manHead: 'assets/sprites/manHead/1.png',
                manArm: 'assets/sprites/manArm/1.png',
                manForearm: 'assets/sprites/manForearm/1.png',
                manThigh: 'assets/sprites/manThigh/1.png',
                manShin: 'assets/sprites/manShin/1.png',
                bg: 'assets/sprites/bg/1.png',
                rider: 'assets/sprites/rider.png'
            };
            let assetsLoaded = 0;
            const totalAssets = Object.keys(assetPaths).length;

            function loadAssets() {
                for (let key in assetPaths) {
                    const img = new Image();
                    img.onload = () => { assetsLoaded++; if (assetsLoaded === totalAssets) console.log("Assets ready"); };
                    img.onerror = () => {
                        console.error(`Failed ${key}`);
                        const fallback = document.createElement('canvas');
                        fallback.width = fallback.height = 32;
                        fallback.getContext('2d').fillStyle = key === 'tiles' ? '#555' : '#f0f';
                        fallback.getContext('2d').fillRect(0, 0, 32, 32);
                        assets[key] = fallback;
                        assetsLoaded++;
                    };
                    img.src = assetPaths[key];
                    assets[key] = img;
                }
            }

            const menuButtons = [
                { label: "PRACTICE", y: Math.round(260 * canvas.height / 600), action: () => startGame() },
                { label: "COMPETE", y: Math.round(320 * canvas.height / 600), action: () => startGame() },
                { label: "HOW TO PLAY", y: Math.round(380 * canvas.height / 600), action: () => { subMenu = 'howto'; } },
                { label: "ABOUT", y: Math.round(440 * canvas.height / 600), action: () => { subMenu = 'about'; } }
            ];
            const btnWidth = 220, btnHeight = 44;
            const btnX = (canvas.width - btnWidth) / 2;

            let gameOverButtons = [
                { label: "RETRY", x: canvas.width / 2 - 110, y: Math.round(400 * canvas.height / 600), width: 100, height: 40, action: () => retryGame() },
                { label: "MENU", x: canvas.width / 2 + 10, y: Math.round(400 * canvas.height / 600), width: 100, height: 40, action: () => { gameState = 'menu'; subMenu = null; syncMusic(); } }
            ];

            let winButtons = [
                { label: "NEXT STAGE", x: canvas.width / 2 - 110, y: Math.round(450 * canvas.height / 600), width: 100, height: 40, action: () => retryGame() },
                { label: "MENU", x: canvas.width / 2 + 10, y: Math.round(450 * canvas.height / 600), width: 100, height: 40, action: () => { gameState = 'menu'; subMenu = null; syncMusic(); } }
            ];

            let mouseX = 0, mouseY = 0;
            let hoverIndex = -1;
            canvas.addEventListener('mousemove', (e) => {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                mouseX = (e.clientX - rect.left) * scaleX;
                mouseY = (e.clientY - rect.top) * scaleY;
                if (gameState === 'menu' && !subMenu) {
                    hoverIndex = -1;
                    for (let i = 0; i < menuButtons.length; i++) {
                        const btn = menuButtons[i];
                        if (mouseX >= btnX && mouseX <= btnX + btnWidth &&
                            mouseY >= btn.y && mouseY <= btn.y + btnHeight) {
                            hoverIndex = i;
                            break;
                        }
                    }
                } else if (gameState === 'gameover') {
                    hoverIndex = -1;
                    for (let i = 0; i < gameOverButtons.length; i++) {
                        const btn = gameOverButtons[i];
                        if (mouseX >= btn.x && mouseX <= btn.x + btn.width &&
                            mouseY >= btn.y && mouseY <= btn.y + btn.height) {
                            hoverIndex = i;
                            break;
                        }
                    }
                } else if (gameState === 'win') {
                    hoverIndex = -1;
                    for (let i = 0; i < winButtons.length; i++) {
                        const btn = winButtons[i];
                        if (mouseX >= btn.x && mouseX <= btn.x + btn.width &&
                            mouseY >= btn.y && mouseY <= btn.y + btn.height) {
                            hoverIndex = i;
                            break;
                        }
                    }
                } else {
                    hoverIndex = -1;
                }
            });

            canvas.addEventListener('click', (e) => {
                if (mouseX >= SOUND_BTN_X && mouseX <= SOUND_BTN_X + SOUND_BTN_W &&
                    mouseY >= SOUND_BTN_Y && mouseY <= SOUND_BTN_Y + SOUND_BTN_H) {
                    soundEnabled = !soundEnabled;
                    syncMusic();
                    return;
                }
                if (gameState === 'menu') {
                    if (subMenu) {
                        if (mouseX >= canvas.width - 100 && mouseX <= canvas.width - 20 &&
                            mouseY >= 20 && mouseY <= 60) {
                            subMenu = null;
                        }
                    } else {
                        if (hoverIndex !== -1) {
                            menuButtons[hoverIndex].action();
                        }
                    }
                } else if (gameState === 'gameover') {
                    if (hoverIndex !== -1) {
                        gameOverButtons[hoverIndex].action();
                    }
                } else if (gameState === 'win') {
                    if (hoverIndex !== -1) {
                        winButtons[hoverIndex].action();
                    }
                }
            });

            const keys = {};
            window.addEventListener('keydown', (e) => {
                keys[e.code] = true;
                if (e.code === 'Space' && gameState === 'menu') startGame();
                if (e.code === 'KeyR' && (gameState === 'gameover' || gameState === 'win')) retryGame();
                if (e.code === 'KeyP' && (gameState === 'playing' || gameState === 'paused')) {
                    e.preventDefault();
                    if (gameState === 'playing') {
                        gameState = 'paused';
                        raceTimeRunning = false;
                    } else if (gameState === 'paused') {
                        gameState = 'playing';
                        raceTimeRunning = true;
                    }
                    syncMusic();
                }
                if (e.code === 'KeyM') {
                    soundEnabled = !soundEnabled;
                    syncMusic();
                }
            });
            window.addEventListener('keyup', e => { keys[e.code] = false; });

            function retryGame() {
                initLevel(0);
            }

            // ---------- Terrain helpers ----------
            function findSafeStartY(x) {
                let groundY = getTerrainHeightAt(x);
                return groundY - WHEEL_RADIUS - 10;
            }

            // ---------- Bike geometry ----------
            function initBike(x, y) {
                points = [
                    { x: x, y: y }, { x: x + 65, y: y }, { x: x + 32, y: y - 20 },
                    { x: x + 48, y: y - 42 }, { x: x + 15, y: y - 32 }
                ];
                prevPoints = points.map(p => ({ x: p.x, y: p.y }));
                const dist = (i, j) => Math.hypot(points[i].x - points[j].x, points[i].y - points[j].y);
                constraints = [
                    { p1: 0, p2: 1, rest: dist(0, 1), stiff: 0.45 },
                    { p1: 0, p2: 2, rest: dist(0, 2), stiff: 0.95 },
                    { p1: 1, p2: 2, rest: dist(1, 2), stiff: 0.95 },
                    { p1: 2, p2: 3, rest: dist(2, 3), stiff: 1.0 },
                    { p1: 2, p2: 4, rest: dist(2, 4), stiff: 1.0 },
                    { p1: 3, p2: 4, rest: dist(3, 4), stiff: 1.0 },
                    { p1: 0, p2: 4, rest: dist(0, 4), stiff: 0.88 },
                    { p1: 1, p2: 3, rest: dist(1, 3), stiff: 0.88 }
                ];
                bikeVelocity = 0;
                bikeLeanAngle = 0;
                targetLean = 0;
                startProtection = 1.0;
                wheelAngle = 0;
                particles = [];
            }

            // ---------- Particles ----------
            function spawnDirtParticles(wheelX, wheelY, velocity, throttle, brake) {
                const speed = Math.abs(velocity);
                const groundY = getTerrainHeightAt(wheelX);
                const onGround = (wheelY + WHEEL_RADIUS) >= groundY - 5;
                if (!onGround) return;

                let intensity = 0;
                if (throttle && speed > 50) intensity = 0.5 + (speed / 500);
                else if (brake && speed > 30) intensity = 0.4 + (speed / 400);
                else if (Math.abs(velocity) > 100) intensity = 0.2;
                else return;

                const count = Math.floor(Math.random() * 3 * intensity) + 1;
                for (let i = 0; i < count; i++) {
                    particles.push({
                        x: wheelX + (Math.random() - 0.5) * 20,
                        y: wheelY + WHEEL_RADIUS - 5,
                        vx: (Math.random() - 0.5) * 80 * intensity,
                        vy: -Math.random() * 100 * intensity,
                        life: 0.5 + Math.random() * 0.5,
                        size: 8 + Math.random() * 8,
                        imgIndex: Math.floor(Math.random() * 8)
                    });
                }
            }

            // ---------- Physics ----------
            // ---------- Physics ----------
            function updatePhysics(dt) {
                if (gameState !== 'playing') return;

                const throttle = keys['ArrowUp'];
                const brake = keys['ArrowDown'];

                // ---- Global engine speed (for rear wheel drive) ----
                if (throttle) bikeVelocity += ACCEL * dt;
                if (brake) bikeVelocity -= BRAKE_FORCE * dt;   // also reduces engine speed
                bikeVelocity *= (1.0 - 0.9 * dt);
                bikeVelocity = Math.min(55, Math.max(-150, bikeVelocity));

                // ---- Lean control (unchanged) ----
                if (keys['ArrowLeft']) targetLean = -1;
                else if (keys['ArrowRight']) targetLean = 1;
                else targetLean = 0;
                bikeLeanAngle += (targetLean * MAX_LEAN - bikeLeanAngle) * (LEAN_SPEED * dt);
                bikeLeanAngle = Math.max(-MAX_LEAN, Math.min(MAX_LEAN, bikeLeanAngle));

                // ---- Verlet integration (gravity on all points, as before) ----
                for (let i = 0; i < points.length; i++) {
                    const p = points[i];
                    const pv = prevPoints[i];
                    const vx = (p.x - pv.x) * 0.992;
                    const vy = (p.y - pv.y) * 0.992;
                    pv.x = p.x;
                    pv.y = p.y;
                    p.x += vx;
                    p.y += vy + GRAVITY * dt * dt;
                }

                // ---- Drive force: rear wheel only (points[0]) ----
                const axleAngle = Math.atan2(points[1].y - points[0].y, points[1].x - points[0].x);
                const speedFactor = Math.min(1.0, Math.abs(bikeVelocity) / 200);
                const steerAngle = axleAngle + bikeLeanAngle * 0.25 * speedFactor;
                const driveX = bikeVelocity * dt * Math.cos(steerAngle);
                const driveY = bikeVelocity * dt * Math.sin(steerAngle) * 0.0;   // keep vertical drive zero to avoid artificial lift

                points[0].x += driveX;
                points[0].y += driveY;
                // Front wheel gets NO drive force

                // ---- Front‑wheel braking (impulse opposite to its motion) ----
                if (brake) {
                    const f = points[1];
                    const fv = prevPoints[1];
                    const fVelX = f.x - fv.x;   // raw velocity (dt cancels out)
                    const fVelY = f.y - fv.y;
                    const fSpeed = Math.hypot(fVelX, fVelY);
                    if (fSpeed > 0.001) {
                        const brakeStrength = 0.25;   // fraction of speed removed per frame
                        const normX = fVelX / fSpeed;
                        const normY = fVelY / fSpeed;
                        // Adjust previous position to reduce velocity
                        prevPoints[1].x += normX * fSpeed * brakeStrength;
                        prevPoints[1].y += normY * fSpeed * brakeStrength;
                    }
                }

                // ---- Constraint solver (unchanged) ----
                for (let iter = 0; iter < 12; iter++) {
                    for (let c of constraints) {
                        const p1 = points[c.p1];
                        const p2 = points[c.p2];
                        const dx = p2.x - p1.x;
                        const dy = p2.y - p1.y;
                        const d = Math.hypot(dx, dy);
                        if (d < 0.001) continue;
                        const corr = (c.rest - d) / d * c.stiff * 0.5;

                        const p1IsWheel = (c.p1 === 0 || c.p1 === 1);
                        const p2IsWheel = (c.p2 === 0 || c.p2 === 1);

                        if (p1IsWheel) {
                            p1.x -= dx * corr;
                            // p1.y unchanged for wheels (kept on ground)
                        } else {
                            p1.x -= dx * corr;
                            p1.y -= dy * corr;
                        }

                        if (p2IsWheel) {
                            p2.x += dx * corr;
                            // p2.y unchanged
                        } else {
                            p2.x += dx * corr;
                            p2.y += dy * corr;
                        }
                    }

                    // ---- Smooth ground collision (vertical snap only, keep horizontal momentum) ----
                    for (let idx of [0, 1]) {
                        const p = points[idx];
                        const pv = prevPoints[idx];
                        const gY = getTerrainHeightAt(p.x);

                        if (p.y + WHEEL_RADIUS > gY) {
                            // Push wheel up to surface
                            p.y = gY - WHEEL_RADIUS;
                            // Kill only vertical velocity (prevents bounce)
                            pv.y = p.y;
                            // Leave pv.x untouched → natural horizontal rolling/sliding

                            // Apply mild friction when on ground (reduces horizontal speed)
                            const contactMargin = 4;   // also apply when very close
                            if (p.y + WHEEL_RADIUS <= gY + contactMargin) {
                                const horizDiff = p.x - pv.x;
                                const friction = 0.96;   // how much horizontal speed remains each frame
                                pv.x = p.x - horizDiff * friction;
                            }
                        }
                    }
                }

                // ---- Lean body points (unchanged) ----
                const midX = (points[0].x + points[1].x) * 0.5;
                const midY = (points[0].y + points[1].y) * 0.5;
                for (let i = 2; i < points.length; i++) {
                    const p = points[i];
                    const pv = prevPoints[i];
                    const dx = p.x - midX;
                    const dy = p.y - midY;
                    const len = Math.hypot(dx, dy);
                    if (len < 0.001) continue;
                    const baseA = Math.atan2(dy, dx);
                    const newA = baseA + bikeLeanAngle * 0.55;
                    const newX = midX + Math.cos(newA) * len;
                    const newY = midY + Math.sin(newA) * len;
                    pv.x += (newX - p.x);
                    pv.y += (newY - p.y);
                    p.x = newX;
                    p.y = newY;
                }

                // ---- World bounds (unchanged) ----
                for (let idx of [0, 1]) {
                    if (points[idx].x < 30) points[idx].x = 30;
                }

                // ---- Wheel rotation & particles (unchanged) ----
                wheelAngle += bikeVelocity * dt * 0.5;

                const rearWheel = points[0];
                spawnDirtParticles(rearWheel.x, rearWheel.y, bikeVelocity, throttle, brake);
                if (Math.random() < 0.3) {
                    const frontWheel = points[1];
                    spawnDirtParticles(frontWheel.x, frontWheel.y, bikeVelocity, throttle, brake);
                }

                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.x += p.vx * dt;
                    p.y += p.vy * dt;
                    p.life -= dt;
                    p.vy += GRAVITY * dt * 0.3;
                    if (p.life <= 0 || p.y > levelHeight + 100) particles.splice(i, 1);
                }
            }

            // ---------- Camera, scoring, lap detection ----------
            function updateGameStats(dt) {
                if (gameState !== 'playing') return;

                if (raceTimeRunning) {
                    raceTime += dt * 1000;
                }

                cameraX = points[0].x - canvas.width * 0.4;
                cameraX = Math.max(0, cameraX);
                if (levelWidth < canvas.width) cameraX = (levelWidth - canvas.width) / 2;

                const midY = (points[0].y + points[1].y) / 2;
                cameraY = midY - canvas.height * 0.6;
                cameraY = Math.min(Math.max(0, cameraY), levelHeight - canvas.height);
                if (levelHeight < canvas.height) cameraY = (levelHeight - canvas.height) / 2;

                if (startProtection > 0) {
                    startProtection -= dt;
                } else {
                    const headGround = getTerrainHeightAt(points[3].x);
                    if (points[3].y > headGround + 25 || points[0].y > levelHeight + 100) {
                        gameState = 'gameover';
                        raceTimeRunning = false;
                        finalRaceTime = raceTime;
                        syncMusic();
                        return;
                    }
                }

                if (finishLineX === 0) finishLineX = levelWidth * 0.9;
                const rearX = points[0].x;
                const nextFinishLineX = finishLinesCrossed * levelWidth + finishLineX;

                if (rearX >= nextFinishLineX) {
                    finishLinesCrossed++;
                    // Mark the lap that was just completed as finished
                    if (finishLinesCrossed <= TOTAL_LAPS) {
                        lapCompleted[finishLinesCrossed - 1] = true;
                    }
                    currentLap = finishLinesCrossed + 1;

                    if (currentLap > TOTAL_LAPS) {
                        gameState = 'win';
                        raceTimeRunning = false;
                        finalRaceTime = raceTime;
                        syncMusic();
                        return;
                    }
                }

                updateTimerDisplay();
                document.getElementById('lap').innerText = `LAP ${currentLap} / ${TOTAL_LAPS}`;
                document.getElementById('speed-val').innerText = Math.floor(Math.abs(bikeVelocity) * 0.18);
            }

            function teleportToStart() {
                const startX = 150;
                const startY = findSafeStartY(startX);
                const dx = startX - points[0].x;
                const dy = startY - points[0].y;
                for (let p of points) {
                    p.x += dx;
                    p.y += dy;
                }
                for (let i = 0; i < prevPoints.length; i++) {
                    prevPoints[i].x += dx;
                    prevPoints[i].y += dy;
                }
                cameraX = startX - canvas.width * 0.4;
                cameraX = Math.min(Math.max(0, cameraX), levelWidth - canvas.width);
                if (levelWidth < canvas.width) cameraX = (levelWidth - canvas.width) / 2;
                lapCrossed = false;
            }

            function updateTimerDisplay() {
                let totalSeconds = raceTime / 1000;
                let minutes = Math.floor(totalSeconds / 60);
                let seconds = Math.floor(totalSeconds % 60);
                let centiseconds = Math.floor((raceTime % 1000) / 10);
                const timerString = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}.${centiseconds.toString().padStart(2, '0')}`;
                document.getElementById('timer').innerText = `TIME ${timerString}`;
            }

            function formatTime(ms) {
                let totalSeconds = ms / 1000;
                let minutes = Math.floor(totalSeconds / 60);
                let seconds = Math.floor(totalSeconds % 60);
                let centiseconds = Math.floor((ms % 1000) / 10);
                return `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}.${centiseconds.toString().padStart(2, '0')}`;
            }


            function drawSoundToggle() {
                ctx.fillStyle = soundEnabled ? '#2ecc71' : '#e74c3c';
                ctx.fillRect(SOUND_BTN_X, SOUND_BTN_Y, SOUND_BTN_W, SOUND_BTN_H);
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 1;
                ctx.strokeRect(SOUND_BTN_X, SOUND_BTN_Y, SOUND_BTN_W, SOUND_BTN_H);
                ctx.font = 'bold 11px "Arial Narrow", Arial, "Elementary SF Black", "Chanson Heavy SF", Tahoma, monospace';
                ctx.fillStyle = '#fff';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(soundEnabled ? "🔊 ON" : "🔇 OFF", SOUND_BTN_X + SOUND_BTN_W / 2, SOUND_BTN_Y + SOUND_BTN_H / 2);
                ctx.textAlign = 'left';
                ctx.textBaseline = 'alphabetic';
            }

            function drawTickerBar() {
                ctx.save();
                ctx.beginPath();
                ctx.rect(0, canvas.height - 28, canvas.width, 28);
                ctx.clip();
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, canvas.height - 28, canvas.width, 28);
                ctx.font = '14px "Arial Narrow", Arial, "Elementary SF Black", "Chanson Heavy SF", Tahoma, monospace';
                ctx.fillStyle = '#ffffff';
                ctx.textBaseline = 'middle';
                ctx.textAlign = 'left';
                if (tickerTextWidth === 0 && ctx) {
                    tickerTextWidth = ctx.measureText(tickerMessage).width;
                }
                ctx.fillText(tickerMessage, tickerX, canvas.height - 14);
                tickerX -= TICKER_SPEED;
                if (tickerX + tickerTextWidth < 0) tickerX = canvas.width;
                ctx.restore();
            }

            const tickerMessage = "Press Space to begin.  |  Use Arrow Keys to move.  |  Press P to pause.  |  Complete 3 laps to win!  |  TG Motocross 2 - HTML5 Edition  |  Good luck!";
            let tickerX = canvas.width;
            let tickerTextWidth = 0;
            const TICKER_SPEED = 1.2;

            // ---------- Menu, game over, win screens ----------
            function drawMenu() {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.font = 'bold 48px "Arial Narrow", Arial, "Elementary SF Black", "Chanson Heavy SF", Tahoma, monospace';
                ctx.fillStyle = '#FF6600';
                ctx.textAlign = 'center';
                ctx.fillText('TG MOTOCROSS 2', canvas.width / 2, 100);
                ctx.font = '18px "Arial Narrow", Arial, "Elementary SF Black", "Chanson Heavy SF", Tahoma, monospace';
                ctx.fillStyle = '#ffffff';
                ctx.fillText('HTML5 Edition', canvas.width / 2, 140);
                if (subMenu === 'howto') drawHowToOverlay();
                else if (subMenu === 'about') drawAboutOverlay();
                else drawMenuButtons();
                ctx.textAlign = 'left';
            }

            function drawMenuButtons() {
                for (let i = 0; i < menuButtons.length; i++) {
                    const btn = menuButtons[i];
                    const isHover = (hoverIndex === i);
                    ctx.fillStyle = isHover ? '#FF6600' : '#333333';
                    ctx.fillRect(btnX, btn.y, btnWidth, btnHeight);
                    ctx.strokeStyle = '#FF6600';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(btnX, btn.y, btnWidth, btnHeight);
                    ctx.font = 'bold 18px "Arial Narrow", Arial, "Elementary SF Black", "Chanson Heavy SF", Tahoma, monospace';
                    ctx.fillStyle = '#ffffff';
                    ctx.textAlign = 'center';
                    ctx.fillText(btn.label, canvas.width / 2, btn.y + 28);
                }
            }

            function drawHowToOverlay() {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.9)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.font = 'bold 32px "Arial Narrow", Arial, "Elementary SF Black", "Chanson Heavy SF", Tahoma, monospace';
                ctx.fillStyle = '#FF6600';
                ctx.fillText('HOW TO PLAY', canvas.width / 2, 100);
                ctx.font = '20px "Arial Narrow", Arial, "Elementary SF Black", "Chanson Heavy SF", Tahoma, monospace';
                ctx.fillStyle = '#fff';
                ctx.fillText('Arrow Up: Accelerate', canvas.width / 2, 180);
                ctx.fillText('Arrow Down: Brake', canvas.width / 2, 230);
                ctx.fillText('Arrow Left / Right: Lean', canvas.width / 2, 280);
                ctx.fillText('P: Pause', canvas.width / 2, 330);
                ctx.fillText('Complete all 3 laps to win!', canvas.width / 2, 380);
                ctx.font = 'bold 18px "Arial Narrow", Arial, "Elementary SF Black", "Chanson Heavy SF", Tahoma, monospace';
                ctx.fillStyle = '#FF6600';
                ctx.fillRect(canvas.width - 100, 20, 80, 40);
                ctx.fillStyle = '#fff';
                ctx.fillText('BACK', canvas.width - 60, 45);
            }

            function drawAboutOverlay() {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.9)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.font = 'bold 32px "Arial Narrow", Arial, "Elementary SF Black", "Chanson Heavy SF", Tahoma, monospace';
                ctx.fillStyle = '#FF6600';
                ctx.fillText('ABOUT', canvas.width / 2, 100);
                ctx.font = '20px monospace';
                ctx.fillStyle = '#fff';
                ctx.fillText('Original game by Teagames Limited (2006)', canvas.width / 2, 180);
                ctx.fillText('HTML5 Port', canvas.width / 2, 230);
                ctx.font = 'bold 18px "Arial Narrow", Arial, "Elementary SF Black", "Chanson Heavy SF", Tahoma, monospace';
                ctx.fillStyle = '#FF6600';
                ctx.fillRect(canvas.width - 100, 20, 80, 40);
                ctx.fillStyle = '#fff';
                ctx.fillText('BACK', canvas.width - 60, 45);
            }

            function drawGameOver() {
                if (gameState !== 'gameover') return;
                ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.font = 'bold 52px "Arial Narrow", Arial, "Elementary SF Black", "Chanson Heavy SF", Tahoma, monospace';
                ctx.fillStyle = '#f33';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 80);
                ctx.font = '22px "Arial Narrow", Arial, "Elementary SF Black", "Chanson Heavy SF", Tahoma, monospace';
                ctx.fillStyle = '#fff';
                ctx.fillText(`Time: ${formatTime(finalRaceTime)}`, canvas.width / 2, canvas.height / 2 - 20);
                for (let i = 0; i < gameOverButtons.length; i++) {
                    const btn = gameOverButtons[i];
                    const isHover = (hoverIndex === i);
                    ctx.fillStyle = isHover ? '#FF6600' : '#333333';
                    ctx.fillRect(btn.x, btn.y, btn.width, btn.height);
                    ctx.strokeStyle = '#FF6600';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(btn.x, btn.y, btn.width, btn.height);
                    ctx.font = 'bold 18px "Arial Narrow", Arial, "Elementary SF Black", "Chanson Heavy SF", Tahoma, monospace';
                    ctx.fillStyle = '#fff';
                    ctx.fillText(btn.label, btn.x + btn.width / 2, btn.y + 28);
                }
                ctx.textAlign = 'left';
            }

            function drawWin() {
                if (gameState !== 'win') return;
                ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.font = 'bold 48px "Arial Narrow", Arial, "Elementary SF Black", "Chanson Heavy SF", Tahoma, monospace';
                ctx.fillStyle = '#ffcc00';
                ctx.textAlign = 'center';
                ctx.fillText('STAGE COMPLETE!', canvas.width / 2, canvas.height / 2 - 80);
                ctx.font = '22px "Arial Narrow", Arial, "Elementary SF Black", "Chanson Heavy SF", Tahoma, monospace';
                ctx.fillStyle = '#fff';
                ctx.fillText(`Time: ${formatTime(finalRaceTime)}`, canvas.width / 2, canvas.height / 2 - 20);
                ctx.fillText(`Lap 3 / 3 Complete`, canvas.width / 2, canvas.height / 2 + 20);
                for (let i = 0; i < winButtons.length; i++) {
                    const btn = winButtons[i];
                    const isHover = (hoverIndex === i);
                    ctx.fillStyle = isHover ? '#FF6600' : '#333333';
                    ctx.fillRect(btn.x, btn.y, btn.width, btn.height);
                    ctx.strokeStyle = '#FF6600';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(btn.x, btn.y, btn.width, btn.height);
                    ctx.font = 'bold 18px "Arial Narrow", Arial, "Elementary SF Black", "Chanson Heavy SF", Tahoma, monospace';
                    ctx.fillStyle = '#fff';
                    ctx.fillText(btn.label, btn.x + btn.width / 2, btn.y + 28);
                }
                ctx.textAlign = 'left';
            }
            function drawTerrain() {
                if (terrainSamples.length === 0) {
                    ctx.fillStyle = '#8B5A2B';
                    ctx.fillRect(0, canvas.height - 100, canvas.width, 100);
                    return;
                }
                const startWorldX = cameraX;
                const step = 2;

                // Draw dirt fill below terrain surface
                ctx.fillStyle = '#6B3A2A';
                ctx.beginPath();
                ctx.moveTo(0, canvas.height);
                for (let sx = 0; sx <= canvas.width; sx += step) {
                    const worldX = startWorldX + sx;
                    const terrainY = getTerrainHeightAt(worldX);
                    const screenY = terrainY - cameraY;
                    ctx.lineTo(sx, screenY);
                }
                ctx.lineTo(canvas.width, canvas.height);
                ctx.closePath();
                ctx.fill();

                // Darker sub‑surface layer
                ctx.fillStyle = '#4a2518';
                ctx.beginPath();
                ctx.moveTo(0, canvas.height);
                for (let sx = 0; sx <= canvas.width; sx += step) {
                    const worldX = startWorldX + sx;
                    const terrainY = getTerrainHeightAt(worldX) + 18;
                    const screenY = terrainY - cameraY;
                    ctx.lineTo(sx, screenY);
                }
                ctx.lineTo(canvas.width, canvas.height);
                ctx.closePath();
                ctx.fill();

                // ---------- Underground stones (pebbles) ----------
                const stoneStartX = Math.floor(startWorldX / 20) * 20;   // align to a grid
                const stoneEndX = startWorldX + canvas.width + 20;
                ctx.fillStyle = '#5a5a5a';   // grey stones
                for (let wx = stoneStartX; wx <= stoneEndX; wx += 20) {
                    // Deterministic pseudo‑random based on world X
                    const hash = (wx * 0x9e3779b9) >>> 0;
                    const placeStone = (hash % 100) < 35;   // ~35% chance of a stone at this column
                    if (!placeStone) continue;

                    const terrainY = getTerrainHeightAt(wx);
                    // Stones appear a little below the surface
                    const stoneY = terrainY + 8 + (hash % 40);   // 8‑48 px below grass
                    const screenY = stoneY - cameraY;
                    if (screenY < -10 || screenY > canvas.height + 10) continue;

                    const size = 2 + (hash % 5);   // 2‑6 px radius
                    ctx.beginPath();
                    ctx.ellipse(wx - startWorldX, screenY, size, size * 0.7, 0, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Grass line on top (unchanged)
                ctx.strokeStyle = '#3d7a28';
                ctx.lineWidth = 4;
                ctx.beginPath();
                let firstPoint = true;
                for (let sx = 0; sx <= canvas.width; sx += step) {
                    const worldX = startWorldX + sx;
                    const terrainY = getTerrainHeightAt(worldX);
                    const screenY = terrainY - cameraY;
                    if (firstPoint) {
                        ctx.moveTo(sx, screenY);
                        firstPoint = false;
                    } else {
                        ctx.lineTo(sx, screenY);
                    }
                }
                ctx.stroke();

                // Highlight edge (unchanged)
                ctx.strokeStyle = '#5a9e3a';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                firstPoint = true;
                for (let sx = 0; sx <= canvas.width; sx += step) {
                    const worldX = startWorldX + sx;
                    const terrainY = getTerrainHeightAt(worldX) - 1;
                    const screenY = terrainY - cameraY;
                    if (firstPoint) {
                        ctx.moveTo(sx, screenY);
                        firstPoint = false;
                    } else {
                        ctx.lineTo(sx, screenY);
                    }
                }
                ctx.stroke();
                ctx.lineWidth = 1;
            }
            function drawBike() {
                if (!points.length) return;

                const rear = points[0];
                const front = points[1];
                const bikeAngle = Math.atan2(front.y - rear.y, front.x - rear.x);

                // World positions → screen positions
                const rsx = rear.x - cameraX;
                const rsy = rear.y - cameraY;
                const fsx = front.x - cameraX;
                const fsy = front.y - cameraY;
                const midX = (rsx + fsx) / 2;
                const midY = (rsy + fsy) / 2;

                const wheelImg = assets.wheel;           // wheel_tire.png
                const bikeRiderImg = assets.rider;       // rider.png
                const wheelSize = 32;                    // drawn size of the wheel
                const wheelPivot = wheelSize / 2;
                const compression = Math.min(6, Math.abs(bikeVelocity) * 0.01); // fork compression

                // ============================================================
                // INDEPENDENT IMAGE CONTROLS — tweak these values
                // ============================================================

                // --- RIDER / FRAME image controls ---
                const riderOffsetX = 0;          // horizontal shift (left/right from midpoint)
                const riderOffsetY = 15;         // vertical shift (up/down from midpoint)
                const riderRotation = 0;         // extra rotation in radians (added to bike angle)
                const riderDrawWidth = 84;       // width in pixels
                const riderPivotX = 0.5;         // horizontal pivot (0 = left, 0.5 = center, 1 = right)
                const riderPivotY = 1.0;         // vertical pivot (0 = top, 1.0 = bottom)

                // --- WHEEL image controls ---
                const wheelOffsetX = 0;          // horizontal shift from wheel center
                const wheelOffsetY = 0;          // vertical shift from wheel center
                const wheelRotation = 0;         // extra rotation in radians (added to wheelAngle)
                // wheelDrawSize is already set by `wheelSize` above

                // ============================================================

                // --- 1. Rear wheel (drawn behind the bike) ---
                ctx.save();
                ctx.translate(rsx, rsy);
                ctx.rotate(wheelAngle + wheelRotation);
                ctx.translate(wheelOffsetX, wheelOffsetY); // apply offset after rotation so it's relative
                if (wheelImg && wheelImg.complete && wheelImg.naturalWidth > 0) {
                    ctx.drawImage(wheelImg, -wheelPivot, -wheelPivot, wheelSize, wheelSize);
                } else {
                    ctx.fillStyle = '#222';
                    ctx.beginPath();
                    ctx.arc(0, 0, WHEEL_RADIUS, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();

                // --- 2. Rider + bike frame (between wheels) ---
                ctx.save();
                ctx.translate(midX + riderOffsetX, midY + riderOffsetY);
                ctx.rotate(bikeAngle + bikeLeanAngle * 0.4 + riderRotation);

                if (bikeRiderImg && bikeRiderImg.complete && bikeRiderImg.naturalWidth > 0) {
                    const imgW = bikeRiderImg.naturalWidth;
                    const imgH = bikeRiderImg.naturalHeight;

                    const drawWidth = riderDrawWidth;
                    const drawHeight = (imgH / imgW) * drawWidth;

                    // Calculate pivot point based on ratios
                    const pivotX = drawWidth * riderPivotX;
                    const pivotY = drawHeight * riderPivotY;

                    ctx.drawImage(bikeRiderImg, -pivotX, -pivotY, drawWidth, drawHeight);
                } else {
                    // Fallback – placeholder rectangle so the game never breaks
                    ctx.fillStyle = '#3498db';
                    ctx.fillRect(-42, -50, 84, 50);
                }
                ctx.restore();

                // --- 3. Front wheel (drawn in front, with fork compression) ---
                ctx.save();
                ctx.translate(fsx, fsy - compression);
                ctx.rotate(wheelAngle + wheelRotation);
                ctx.translate(wheelOffsetX, wheelOffsetY); // apply offset after rotation so it's relative
                if (wheelImg && wheelImg.complete && wheelImg.naturalWidth > 0) {
                    ctx.drawImage(wheelImg, -wheelPivot, -wheelPivot, wheelSize, wheelSize);
                } else {
                    ctx.fillStyle = '#222';
                    ctx.beginPath();
                    ctx.arc(0, 0, WHEEL_RADIUS, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
            }
            function drawParticles() {
                for (let p of particles) {
                    const img = dirtImages[p.imgIndex];
                    if (img && img.complete && img.naturalWidth > 0) {
                        ctx.globalAlpha = Math.min(1, p.life * 2);
                        ctx.drawImage(img, p.x - cameraX - p.size / 2, p.y - cameraY - p.size / 2, p.size, p.size);
                        ctx.globalAlpha = 1;
                    } else {
                        ctx.fillStyle = `rgba(139, 69, 19, ${p.life * 0.5})`;
                        ctx.beginPath();
                        ctx.arc(p.x - cameraX, p.y - cameraY, p.size / 2, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }

            function drawFinishLine() {
                if (gameState !== 'playing' && gameState !== 'paused') return;
                const squareSize = 8;
                const flagHeight = 60;
                const finishTerrainY = getTerrainHeightAt(finishLineX);
                const groundY = finishTerrainY - cameraY;

                const startLap = Math.max(0, Math.floor((cameraX - 20) / levelWidth));
                const endLap = Math.floor((cameraX + canvas.width + 20) / levelWidth);

                for (let lap = startLap; lap <= endLap; lap++) {
                    const screenX = (lap * levelWidth + finishLineX) - cameraX;
                    if (screenX < -10 || screenX > canvas.width + 10) continue;

                    // Determine which lap this line instance belongs to (0‑based)
                    const lapIndex = lap % TOTAL_LAPS;   // 0 = lap1, 1 = lap2, 2 = lap3
                    const isCompleted = lapIndex < finishLinesCrossed;  // already crossed?

                    // Set text and colour
                    let label;
                    if (lapIndex === 0) label = 'LAP1';
                    else if (lapIndex === 1) label = 'LAP2';
                    else label = 'FINISH';

                    const textColor = isCompleted ? '#2ecc71' : '#ffffff';   // green if done, else white

                    // Draw the checkerboard flags (unchanged)
                    for (let row = 0; row < flagHeight / squareSize; row++) {
                        for (let col = 0; col < 2; col++) {
                            const isDark = (row + col) % 2 === 0;
                            ctx.fillStyle = isDark ? '#000' : '#fff';
                            ctx.fillRect(
                                screenX + col * squareSize - squareSize,
                                groundY - flagHeight + row * squareSize,
                                squareSize, squareSize
                            );
                        }
                    }

                    // Draw the label
                    ctx.font = 'bold 13px Arial';
                    ctx.fillStyle = textColor;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'bottom';
                    ctx.fillText(label, screenX, groundY - flagHeight - 6);
                }

                // Reset alignment (good practice)
                ctx.textAlign = 'left';
                ctx.textBaseline = 'alphabetic';
            }
            function drawPauseOverlay() {
                if (gameState !== 'paused') return;
                ctx.fillStyle = 'rgba(0, 0, 0, 0.55)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.font = 'bold 42px "Arial Narrow", Arial, "Elementary SF Black", "Chanson Heavy SF", Tahoma, monospace';
                ctx.fillStyle = '#fff';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('PAUSED', canvas.width / 2, canvas.height / 2 - 30);
                ctx.font = '20px "Arial Narrow", Arial, "Elementary SF Black", "Chanson Heavy SF", Tahoma, monospace';
                ctx.fillStyle = '#ccc';
                ctx.fillText('Press P to continue', canvas.width / 2, canvas.height / 2 + 30);
                ctx.textAlign = 'left';
                ctx.textBaseline = 'alphabetic';
            }

            function drawUI() {
                debugDiv.innerText = `X:${Math.round(points[0]?.x || 0)} Y:${Math.round(points[0]?.y || 0)} Vel:${Math.round(bikeVelocity)} Lean:${bikeLeanAngle.toFixed(2)} Part:${particles.length}`;
            }

            // ---------- Level Init ----------
            function initLevel(levelIdx) {
                currentLevel = levelIdx;
                mapData = (window.tileMaps && window.tileMaps[currentLevel]) ? window.tileMaps[currentLevel] : null;
                if (window.trackSizes && window.trackSizes[currentLevel]) {
                    levelHeight = window.trackSizes[currentLevel][0];
                    levelWidth = window.trackSizes[currentLevel][1];
                } else {
                    levelHeight = 800;
                    levelWidth = 6000;
                }
                finishLineX = levelWidth * 0.9;

                // Generate procedural sine-wave terrain
                generateSineTerrain();

                const startX = 150;
                const startY = findSafeStartY(startX);
                initBike(startX, startY);
                cameraX = startX - canvas.width * 0.4;
                cameraY = startY - canvas.height * 0.6;
                bikeVelocity = 0;

                raceTime = 0;
                raceTimeRunning = true;
                currentLap = 1;
                currentStage = 1;
                lapCrossed = false;
                finishLinesCrossed = 0;
                finalRaceTime = 0;

                gameState = 'playing';
                particles = [];
                updateTimerDisplay();
                document.getElementById('lap').innerText = `LAP ${currentLap} / ${TOTAL_LAPS}`;
                document.getElementById('timer').style.display = 'block';
                document.getElementById('lap').style.display = 'block';
                document.getElementById('speedometer').style.display = 'block';

                syncMusic();
            }

            function startGame() {
                subMenu = null;
                initLevel(0);
            }

            // ---------- Main Loop ----------
            let lastTime = performance.now();
            function gameLoop() {
                const now = performance.now();
                let dt = Math.min(0.033, (now - lastTime) / 1000);
                if (dt < 0.001) dt = 0.016;
                lastTime = now;

                updatePhysics(dt);
                updateGameStats(dt);

                ctx.clearRect(0, 0, canvas.width, canvas.height);

                if (assets.bg && assets.bg.complete && assets.bg.naturalWidth > 0) {
                    const bgW = assets.bg.width;
                    const off = (cameraX * 0.3) % bgW;
                    ctx.drawImage(assets.bg, -off, 0, canvas.width, canvas.height);
                    ctx.drawImage(assets.bg, bgW - off, 0, canvas.width, canvas.height);
                } else {
                    ctx.fillStyle = '#2a3f5e';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                }

                drawTerrain();
                drawFinishLine();
                drawParticles();
                drawBike();
                drawUI();
                drawPauseOverlay();

                if (gameState === 'menu') drawMenu();
                else if (gameState === 'gameover') drawGameOver();
                else if (gameState === 'win') drawWin();

                drawSoundToggle();
                drawTickerBar();

                requestAnimationFrame(gameLoop);
            }

            loadAssets();
            for (let i = 0; i < dirtImages.length; i++) {
                dirtImages[i].onload = () => { };
            }
            if (window.tileMaps && window.tileMaps[0] && window.trackSizes && window.trackSizes[0]) {
                mapData = window.tileMaps[0];
                levelHeight = window.trackSizes[0][0];
                levelWidth = window.trackSizes[0][1];
            } else {
                mapData = null;
                levelHeight = 800;
                levelWidth = 6000;
            }
            finishLineX = levelWidth * 0.9;
            generateSineTerrain();
            gameLoop();
        })();
    </script>
